<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">微信公众平台基础信息配置示意图</title>
  <desc id="desc">示意用户在微信公众平台的基础信息页面找到 AppID，在开发密钥区域找到 AppSecret 和 API IP 白名单字段。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f2b1d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#0c8b5a"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#c56a00"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#f4f6f5"/>
  <text x="40" y="58" fill="#a4a9a6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760">首页</text>
  <text x="91" y="58" fill="#222624" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760">/ 公众号</text>
  <rect x="785" y="29" width="132" height="42" rx="8" fill="#ffffff"/>
  <circle cx="811" cy="50" r="12" fill="#0a6b3d"/>
  <text x="831" y="56" fill="#202422" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">公众号</text>
  <path d="M893 46l6 6 6-6" fill="none" stroke="#7a817d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="28" y="96" width="904" height="486" rx="10" fill="#ffffff" filter="url(#shadow)"/>

  <text x="66" y="147" fill="#191d1b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="780">基础信息</text>
  <text x="151" y="147" fill="#6d7470" font-family="Inter, Arial, sans-serif" font-size="18">开放能力</text>
  <text x="248" y="147" fill="#6d7470" font-family="Inter, Arial, sans-serif" font-size="18">接口管理</text>
  <text x="349" y="147" fill="#6d7470" font-family="Inter, Arial, sans-serif" font-size="18">绑定关系</text>
  <text x="450" y="147" fill="#6d7470" font-family="Inter, Arial, sans-serif" font-size="18">授权关系</text>
  <path d="M65 163h64" stroke="#1c211e" stroke-width="2"/>

  <circle cx="84" cy="226" r="23" fill="#0d6b43"/>
  <circle cx="84" cy="226" r="16" fill="#155f3f"/>
  <path d="M72 229c10-14 22-15 34-1-12-5-23-5-34 1z" fill="#7ed66e"/>
  <text x="124" y="234" fill="#1f2522" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="780">示例公众号</text>
  <text x="706" y="229" fill="#36538b" font-family="Inter, Arial, sans-serif" font-size="15">扫码关注</text>
  <text x="774" y="229" fill="#36538b" font-family="Inter, Arial, sans-serif" font-size="15">成员管理</text>
  <rect x="845" y="210" width="72" height="39" rx="9" fill="#f3f5f6"/>
  <text x="868" y="235" fill="#161a18" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="760">编辑</text>

  <text x="124" y="293" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="760">AppID</text>
  <text x="190" y="293" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">wx******************</text>
  <rect x="324" y="280" width="12" height="12" rx="1" fill="none" stroke="#9aa19d"/>
  <rect x="328" y="276" width="12" height="12" rx="1" fill="none" stroke="#c4c9c6"/>

  <text x="124" y="329" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">原始ID</text>
  <text x="190" y="329" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">gh_**************</text>
  <text x="124" y="365" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">微信号</text>
  <text x="190" y="365" fill="#a0a7a3" font-family="Inter, Arial, sans-serif" font-size="15">暂未配置</text>
  <text x="124" y="401" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">邮箱</text>
  <text x="190" y="401" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">example@****.com</text>

  <text x="520" y="293" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">管理员</text>
  <rect x="594" y="277" width="24" height="24" rx="4" fill="#efe6d4"/>
  <text x="628" y="293" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">管理员</text>
  <text x="520" y="329" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">主体名称</text>
  <text x="594" y="329" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">示例主体</text>
  <text x="520" y="365" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">认证类型</text>
  <text x="594" y="365" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">个人</text>
  <text x="520" y="401" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="15">认证状态</text>
  <text x="594" y="401" fill="#a0a7a3" font-family="Inter, Arial, sans-serif" font-size="15">暂未认证</text>

  <path d="M64 438h830" stroke="#e1e5e3"/>
  <text x="124" y="490" fill="#191d1b" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="780">开发密钥</text>
  <circle cx="224" cy="483" r="7" fill="none" stroke="#aab2ae"/>
  <text x="222" y="488" fill="#8a928e" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="760">i</text>

  <text x="124" y="532" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="760">AppSecret</text>
  <text x="226" y="532" fill="#36538b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="760">重置</text>
  <text x="268" y="532" fill="#36538b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="760">冻结</text>
  <text x="124" y="569" fill="#686f6b" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="760">API IP白名单</text>
  <text x="246" y="569" fill="#111513" font-family="Inter, Arial, sans-serif" font-size="15">43.167.247.143</text>
  <text x="380" y="569" fill="#36538b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="760">编辑</text>

  <rect x="112" y="267" width="250" height="40" rx="10" fill="none" stroke="#0c8b5a" stroke-width="3"/>
  <rect x="570" y="254" width="250" height="56" rx="14" fill="#0c8b5a"/>
  <text x="592" y="278" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="780">1. 复制 AppID</text>
  <text x="592" y="299" fill="#ddf7e9" font-family="Inter, Arial, sans-serif" font-size="13">在基础信息的 AppID 行</text>
  <path d="M570 284C492 280 442 282 364 286" fill="none" stroke="#0c8b5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <rect x="112" y="512" width="240" height="33" rx="9" fill="none" stroke="#c56a00" stroke-width="3"/>
  <rect x="548" y="455" width="286" height="64" rx="14" fill="#c56a00"/>
  <text x="570" y="480" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="780">2. 找到 AppSecret</text>
  <text x="570" y="502" fill="#fff4dc" font-family="Inter, Arial, sans-serif" font-size="13">点击重置后保存密钥</text>
  <path d="M548 492C494 510 427 522 354 529" fill="none" stroke="#c56a00" stroke-width="2.5" marker-end="url(#arrow-amber)"/>

  <rect x="112" y="548" width="550" height="34" rx="9" fill="none" stroke="#0c8b5a" stroke-width="3"/>
  <rect x="620" y="528" width="214" height="56" rx="14" fill="#0c8b5a"/>
  <text x="640" y="552" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="780">3. IP 白名单</text>
  <text x="640" y="573" fill="#ddf7e9" font-family="Inter, Arial, sans-serif" font-size="13">编辑后加入 IP</text>
  <path d="M674 584C676 592 668 594 660 584" fill="none" stroke="#0c8b5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
</svg>
