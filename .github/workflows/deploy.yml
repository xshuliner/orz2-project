name: Deploy

run-name: Deploy ${{ inputs.env }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      env:
        description: Deployment environment.
        required: true
        default: prod
        type: choice
        options:
          - prod
          - uat
      bump:
        description: Version bump before deploy.
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

jobs:
  release:
    name: Resolve release version
    uses: xshuliner/build-info/.github/workflows/release-tag.yml@master
    with:
      bump: ${{ inputs.bump }}
      sync_package_json_version: true

  deploy:
    name: Build and deploy site
    needs: release
    uses: xshuliner/build-info/.github/workflows/release-deploy.yml@master
    with:
      target: web
      env: ${{ inputs.env }}
      project_name: orz2
      bump: none
      node_version: "22"
      install_command: |
        corepack enable
        if [ "${{ needs.release.outputs.created }}" = "true" ]; then
          git fetch --tags --force
          git checkout "${{ needs.release.outputs.version }}"
        fi
        pnpm install --frozen-lockfile
      build_command: |
        export XSHULINER_APP_MODE=github-actions
        export XSHULINER_DEPLOY_REGION=server
        export XSHULINER_RELEASE_ID="$GITHUB_RUN_ID-$(git rev-parse HEAD)"
        export XSHULINER_BUILD_ID="$GITHUB_RUN_NUMBER"
        pnpm run build:${{ inputs.env }}
      build_path: dist
      server_path_map: |
        {
          "prod": "/var/www/orz2.online/html",
          "uat": "/var/www/orz2.online/html/uat"
        }
      server_preview_url_map: |
        {
          "prod": "https://www.orz2.online",
          "uat": "https://www.orz2.online/uat"
        }
      server_clean_mode: artifact
      ssh_strict_host_key: true
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      NOTIFY_WEBHOOKS: ${{ secrets.NOTIFY_WEBHOOKS }}
      REPORT_AUTHORIZATION: ${{ secrets.REPORT_AUTHORIZATION }}
