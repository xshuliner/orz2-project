name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build production artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm run build:prod

      - name: Upload static site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-site-dist
          path: dist/
          if-no-files-found: error

  deploy:
    name: Deploy production site
    needs: build
    uses: ./.github/workflows/deploy-static-site.yml
    with:
      artifact_name: static-site-dist
      ssh_host: ${{ vars.DEPLOY_SSH_HOST }}
      ssh_port: ${{ fromJSON(vars.DEPLOY_SSH_PORT) }}
      ssh_user: ${{ vars.DEPLOY_SSH_USER }}
      allowed_root: ${{ vars.DEPLOY_ROOT }}
      target_dir: ${{ vars.DEPLOY_ROOT }}
      sync_mode: manifest-clean
      protected_entries: ${{ vars.DEPLOY_PROTECTED_ENTRIES }}
    secrets:
      ssh_private_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      ssh_known_hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
