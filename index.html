<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="google-adsense-account" content="%VITE_GOOGLE_ADSENSE_CLIENT%" />
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('orz2:theme-preference');
          var preference =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var theme =
            preference === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : preference;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute(
              'content',
              theme === 'dark' ? '#0d120f' : '#ffffff'
            );
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <script>
      (function () {
        var client = '%VITE_GOOGLE_ADSENSE_CLIENT%';
        if (!/^ca-pub-\d{16}$/.test(client)) return;

        var script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.src =
          'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' +
          encodeURIComponent(client);
        document.head.appendChild(script);
      })();
    </script>
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="ORZ2 汇集 AI 写作、图片处理、开发调试、营销和办公效率工具，并提供可定制的商业化工具站方案。"
    />
    <meta property="og:site_name" content="ORZ2" />
    <meta property="og:title" content="ORZ2 - 在线 AI 工具与效率工具平台" />
    <meta
      property="og:description"
      content="浏览 ORZ2 在线工具、AI 效率工具和可定制工具站方案。"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://cos.orz2.online/Logo/orz2/logo_dark_320x320.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      type="image/png"
      href="https://cos.orz2.online/Logo/orz2/logo_dark_320x320.webp"
    />
    <link rel="preconnect" href="https://cos.orz2.online" />
    <link
      rel="preload"
      as="image"
      href="https://cos.orz2.online/Orz2/Hero/hero_poster_shuxiaolan.webp"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap"
      />
    </noscript>
    <title>ORZ2</title>
  </head>
  <body>
    <div id="root"></div>
    <script
      vite-ignore

      src="%BASE_URL%__xshuliner__/build-info.js"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
