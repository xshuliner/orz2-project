# Include inside the ORZ2 static site's `server` block.
# Hashed Vite assets are immutable; the HTML entry must be revalidated so it can
# reference a newly deployed asset graph.
location ~ ^/(?:uat/)?assets/ {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location ~ ^/(?:uat/)?index\.html$ {
  add_header Cache-Control "no-cache" always;
}
